server:
  port: ${API_GATEWAY_PORT}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth_service
          uri: http://${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/${AUTH_SERVICE_PATH}/**
        - id: profile_service
          uri: http://${PROFILE_SERVICE_HOST}:${PROFILE_SERVICE_PORT}
          predicates:
            - Path=/${PROFILE_SERVICE_PATH}/**