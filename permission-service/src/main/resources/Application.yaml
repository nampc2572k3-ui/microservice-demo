server:
  port: ${PERMISSION_SERVICE_PORT}
  servlet:
    context-path: /${PERMISSION_SERVICE_PATH}

spring:
  application:
    name: permission-service

  # db
  datasource:
    url: jdbc:mysql://${PERMISSION_DB_HOST}:${PERMISSION_DB_PORT}/${PERMISSION_MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${PERMISSION_MYSQL_USER}
    password: ${PERMISSION_MYSQL_PASSWORD}

  # flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:mysql://${PERMISSION_DB_HOST}:${PERMISSION_DB_PORT}/${PERMISSION_MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    user: ${PERMISSION_MYSQL_USER}
    password: ${PERMISSION_MYSQL_PASSWORD}
    baseline-on-migrate: true
    out-of-order: true
    clean-disabled: true

  # jpa
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  # kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    consumer:
      group-id: permission-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.demo.domain.event"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true

  # redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: ${REDIS_TIMEOUT}
      database: ${PERMISSION_REDIS_DATABASE}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

app:
  kafka:
    topics:
      permission-changed: permission.changed
      role-assigned: permission.role.assigned
      role-revoked: permission.role.revoked

# logging
logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG