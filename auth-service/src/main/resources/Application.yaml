server:
  port: 8080
  servlet:
    context-path: /auth

# db
spring:
  application:
    name: identity-service
  datasource:
    url: "jdbc:mysql://${AUTH_DB_HOST}:${AUTH_DB_PORT}/${AUTH_MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: dev
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# jwt
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

# redis
microservice-redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  timeout: ${REDIS_TIMEOUT}
  database: ${REDIS_DATABASE}