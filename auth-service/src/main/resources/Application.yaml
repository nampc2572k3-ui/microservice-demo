server:
  port: ${AUTH_SERVICE_PORT}
  servlet:
    context-path: /${AUTH_SERVICE_PATH}

# db
spring:
  application:
    name: auth-service

  datasource:
    master:
      url: "jdbc:mysql://${AUTH_DB_HOST}:${AUTH_DB_PORT}/${AUTH_MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh"
      driverClassName: "com.mysql.cj.jdbc.Driver"
      username: ${AUTH_MYSQL_USER}
      password: ${AUTH_MYSQL_PASSWORD}
      hikari:
        pool-name: master-pool
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
    slave:
      url: "jdbc:mysql://${AUTH_DB_HOST}:${AUTH_DB_REPLICA_PORT}/${AUTH_MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh"
      driverClassName: "com.mysql.cj.jdbc.Driver"
      username: ${AUTH_MYSQL_USER}
      password: ${AUTH_MYSQL_ROOT_PASSWORD}
      hikari:
        pool-name: slave-pool
        maximum-pool-size: 20
        minimum-idle: 5

# flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: "jdbc:mysql://${AUTH_DB_HOST}:${AUTH_DB_PORT}/${AUTH_MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh"
    user: ${AUTH_MYSQL_USER}
    password: ${AUTH_MYSQL_ROOT_PASSWORD}
    baseline-on-migrate: true
    out-of-order: true
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  # kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    consumer:
      group-id: auth-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.demo.domain.event"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true

# jwt
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}
  issuer: ${JWT_ISSUER}

# redis
microservice-redis:
  timeout: ${REDIS_TIMEOUT}
  database: ${REDIS_DATABASE}
  cluster:
    nodes:
      - redis-node-1:6379
      - redis-node-2:6379
      - redis-node-3:6379
      - redis-node-4:6379
      - redis-node-5:6379
      - redis-node-6:6379
    max-redirects: 3
  lettuce:
    pool:
      max-active: 20
      max-idle: 10
      min-idle: 2
      max-wait: 2000ms
    cluster:
      refresh:
        adaptive: true
        period: 30s

# eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  kafka:
    topics:
      login-success: auth.login.success
      login-permission-warmup: auth.login.permission-warmup

# logging
logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
